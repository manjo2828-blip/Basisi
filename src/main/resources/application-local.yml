# 로컬 개발 환경에서 사용할 서버 설정입니다.
server:
  # 로컬 실행 포트를 8080으로 지정합니다.
  port: 8080

# 스프링 및 데이터베이스 연동 설정입니다.
spring:
  datasource:
    # 로컬 PostgreSQL 연결 URL입니다.
    url: jdbc:postgresql://localhost:5432/basisi
    # 데이터베이스 사용자 계정입니다.
    username: postgres
    # 데이터베이스 비밀번호입니다.
    password: postgres
    # PostgreSQL 드라이버 클래스를 지정합니다.
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      # 개발 단계에서 테이블 스키마를 자동으로 업데이트합니다.
      ddl-auto: update
    properties:
      hibernate:
        # SQL 로그를 보기 좋게 출력하도록 설정합니다.
        format_sql: true
    # 실행되는 SQL을 콘솔에 출력합니다.
    show-sql: true

# JWT 발급/검증에 사용하는 설정입니다.
jwt:
  secret: ${BASISI_JWT_SECRET:YmFzaXNpLWRldjItand0LXNlY3JldC1rZXktZm9yLWxvY2FsLXRlc3Q=}
  # Access Token 만료 시간(ms). 로컬 개발 편의를 위해 h2 프로필과 동일하게 24시간으로 둡니다.
  access-token-expiration-ms: 86400000

# 예약 정책 설정입니다.
reservation:
  policy:
    # REQUESTED 상태 동시 요청 허용 여부입니다.
    allow-requested-overlap: true
    # 최소 예약 시간(분)입니다.
    minimum-duration-minutes: 60
  lock:
    # Redisson 연결 주소입니다.
    redis-address: redis://127.0.0.1:6379
    # 락 획득 대기 시간(초)입니다.
    wait-seconds: 3
    # 락 자동 해제 시간(초)입니다.
    lease-seconds: 10

# OpenAI LLM 연동 설정입니다.
ai:
  enabled: true
  provider: openai
  api-key: ${BASISI_OPENAI_API_KEY:}
  model: gpt-4o-mini
  base-url: https://api.openai.com/v1
  timeout-ms: 15000
  max-retries: 0
  cache-ttl-minutes: 30
  rate-limit-per-user-per-minute: 2

# 비동기 이벤트 파이프라인(Kafka) 설정입니다.
async:
  events:
    # 기본값은 비활성화입니다. Kafka를 띄운 뒤 true로 바꿔 사용하세요.
    enabled: false
    kafka:
      bootstrap-servers: localhost:9092
      consumer-group: basisi-event-consumers
      topics:
        reservation: basisi.reservation-events
        review: basisi.review-events
